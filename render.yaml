services:
  - type: web
    name: conciliacion-sbss-api
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: conciliacion-sbss-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: CORS_ORIGIN
        value: https://conciliacion-sbss-web.onrender.com
      - key: UPLOAD_DIR
        value: ./uploads
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: conciliacion-sbss-web
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://conciliacion-sbss-api.onrender.com/api

databases:
  - name: conciliacion-sbss-db
    databaseName: conciliacion_sbss
    plan: free
